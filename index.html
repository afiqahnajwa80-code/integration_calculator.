<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Definite Integration Calculator</title>
    <link rel="stylesheet" href="https://unpkg.com/mathlive/dist/mathlive-static.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--card);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
        .controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #475569;
        }
        input {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .bounds {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .result-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            padding: 16px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .integral-display {
            font-size: 1.4rem;
            font-family: "Cambria Math", "Times New Roman", serif;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .integral-sign {
            font-size: 2.2rem;
            position: relative;
            line-height: 1;
        }
        .limits {
            display: inline-flex;
            flex-direction: column;
            font-size: 0.75rem;
            vertical-align: middle;
            margin-left: -4px;
            margin-right: 4px;
            justify-content: space-between;
            height: 2.4rem;
        }
        .limit-upper { margin-bottom: auto; }
        .limit-lower { margin-top: auto; }
        .error-msg {
            color: #dc2626;
            font-size: 0.85rem;
            min-height: 20px;
        }
        .graph-container {
            position: relative;
            min-height: 350px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <h2>Integration Calculator</h2>
        
        <div class="input-group">
            <label for="function-input">Function f(x)</label>
            <input type="text" id="function-input" value="x^2 - 2x">
        </div>
        
        <div class="bounds">
            <div class="input-group">
                <label for="limit-a">Lower Bound (a)</label>
                <input type="number" id="limit-a" value="0" step="any">
            </div>
            <div class="input-group">
                <label for="limit-b">Upper Bound (b)</label>
                <input type="number" id="limit-b" value="3" step="any">
            </div>
        </div>

        <div id="error" class="error-msg"></div>

        <div class="result-box">
            <div class="integral-display">
                <span class="integral-sign">∫</span>
                <span class="limits">
                    <span id="math-b" class="limit-upper">3</span>
                    <span id="math-a" class="limit-lower">0</span>
                </span>
                <span id="math-fx">(x² - 2x)</span> dx = <strong id="math-result">0.00</strong>
            </div>
        </div>
    </div>

    <div class="graph-container">
        <canvas id="graphCanvas"></canvas>
    </div>
</div>

<script>
    let chart;
    const ctx = document.getElementById('graphCanvas').getContext('2d');

    // Setup input listeners
    const fInput = document.getElementById('function-input');
    const aInput = document.getElementById('limit-a');
    const bInput = document.getElementById('limit-b');
    const errorDiv = document.getElementById('error');

    [fInput, aInput, bInput].forEach(input => {
        input.addEventListener('input', calculateAndPlot);
    });

    // Composite Simpson's Rule for accurate numerical integration
    function simpsonsRule(f, a, b, n = 200) {
        if (n % 2 !== 0) n++; // Ensure n is even
        const h = (b - a) / n;
        let sum = f(a) + f(b);

        for (let i = 1; i < n; i++) {
            const x = a + i * h;
            sum += i % 2 === 0 ? 2 * f(x) : 4 * f(x);
        }
        return (h / 3) * sum;
    }

    function calculateAndPlot() {
        errorDiv.textContent = "";
        const fStr = fInput.value.trim();
        const a = parseFloat(aInput.value);
        const b = parseFloat(bInput.value);

        if (!fStr || isNaN(a) || isNaN(b)) {
            return;
        }

        try {
            // Compile mathematical function string using math.js
            const compiledExpr = math.compile(fStr);
            const f = (x) => compiledExpr.evaluate({ x: x });

            // Test run function to check viability
            f(a);

            // Compute Area / Integral Value
            const result = simpsonsRule(f, a, b);
            
            // Dynamic UI updates
            document.getElementById('math-a').textContent = a;
            document.getElementById('math-b').textContent = b;
            document.getElementById('math-fx').textContent = `(${fStr})`;
            document.getElementById('math-result').textContent = Number(result.toFixed(4));

            // Generate graphing points dynamically framed around limits [a, b]
            const padding = Math.max(2, Math.abs(b - a) * 0.5);
            const startX = Math.min(a, b) - padding;
            const endX = Math.max(a, b) + padding;
            
            const labels = [];
            const dataFull = [];
            const dataShaded = [];

            const steps = 150;
            const delta = (endX - startX) / steps;

            for (let i = 0; i <= steps; i++) {
                const x = startX + i * delta;
                let y = f(x);
                
                // Handle non-real results cleanly
                if (typeof y !== 'number' || isNaN(y)) y = null;

                labels.push(x);
                dataFull.push(y);

                // Shading tracking loop
                if (x >= Math.min(a, b) && x <= Math.max(a, b)) {
                    dataShaded.push({x: x, y: y});
                }
            }

            updateChart(labels, dataFull, dataShaded, a, b);

        } catch (err) {
            errorDiv.textContent = "Invalid Expression or Calculation Error";
        }
    }

    function updateChart(labels, lineData, shadedData, a, b) {
        if (chart) {
            chart.destroy();
        }

        // Generate specific dataset array configured to shade the integrals bounds
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'f(x)',
                        data: lineData,
                        borderColor: '#2563eb',
                        borderWidth: 2.5,
                        pointRadius: 0,
                        fill: false
                    },
                    {
                        label: 'Integrated Area',
                        data: shadedData,
                        backgroundColor: 'rgba(37, 99, 235, 0.25)',
                        borderColor: 'transparent',
                        pointRadius: 0,
                        fill: 'origin', // Colors down to the x-axis
                        parsing: {
                            xAxisKey: 'x',
                            yAxisKey: 'y'
                        }
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        type: 'linear',
                        position: 'bottom',
                        grid: { color: '#e2e8f0' }
                    },
                    y: {
                        grid: { color: '#e2e8f0' }
                    }
                }
            }
        });
    }

    // Initialize application payload
    calculateAndPlot();
</script>

</body>
</html>
